<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('user.static', filename='css/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('user.static', filename='css/password_reset.css') }}">
</head>
<body>
    <!-- Блок для ввода email -->
    {% if not confirm_reset_password and not show_success %}
    <div class="password_reset" style="display: block;">
        <p class="titles">Відновлення пароля</p>
        <button class="close-password-reset"  id="close-user"> 
            <img src="{{ url_for('static', filename='/icon/cross.png') }}" alt="">
        </button>
    
        <form action="{{ url_for('user.email_password') }}" method="post">
        <div class="write-email">
            <label class="email"> Email </label> 
            <input class="email" type="email" placeholder="Ввведіть Email" name="email_pass" required> 
        </div> 
    
        <div class="button-password-reset">
            <button type="button" class="cancel" id="user-back">СКАСУВАТИ</button>
            <button type="submit" id="send-email" name="form_identity" value="send-email">НАДІСЛАТИ ЛИСТ</button>
        </div>
        </form>
    </div>
    {% endif %}

    <!-- Блок для нового пароля -->
    {% if confirm_reset_password %}
    <div class="new-password" style="display: block;">
        <p class="titles">Новий пароль</p>
        <button class="close-password-reset" id="close-user">
            <img src="{{ url_for('static', filename='/icon/cross.png') }}" alt="">
        </button> 
        <form action="{{ url_for('user.email_password') }}" method="post">
            <input type="hidden" name="token" value="{{ request.args.get('token') }}">
            <div class="write-password password-field">
                <label>Пароль</label>
                <button id="eye" class="eye" type="button"></button>
                <input id="pass" type="password" placeholder="Введіть пароль" name="new_password" required>
            </div>
            <div class="confpass password-field">
                <label>Підтвердження пароля</label>
                <button id="eye" class="eye" type="button"></button> 
                <input id="pass" type="password" placeholder="Повторіть пароль" name="confirm_new_password" required>
            </div>   
            <div class="button-password-reset-2">
                <button type="button" class="cancel" id="user-back">СКАСУВАТИ</button>
                <button id="save_password" name="form_identity" value="save-new-password">ЗБЕРЕГТИ НОВИЙ ПАРОЛЬ</button>
            </div>
        </form>
    </div>
    {% endif %}

    <!-- Блок успешного сброса пароля -->
    {% if show_success %}
    <div class="password_reset_final" style="display: block;">
        <p class="titles">Пароль змінено</p>
        <button class="close-password-reset-final" id="close-user">
            <img src="{{ url_for('static', filename='/icon/cross.png') }}" alt="">
        </button>
        
        <div class="password-reset-complete-message">
            <p class="password-reset-complete-1">Пароль успішно змінено!</p>
            <p class="password-reset-complete-2">Тепер ви можете увійти з новим паролем.</p>
        </div>
        <div class="button-password-reset-final">
            <button class="save_password_final">УВІЙТИ</button>
        </div>
    </div>
    {% endif %}

    <script src="{{ url_for('static', filename= 'js/ModalWindow_user.js') }}"></script>
    <script src="{{ url_for('home.static', filename= 'js/ConfirmResetPassword.js') }}"></script>
    <script src="{{ url_for('static', filename= 'js/eye.js') }}" ></script>
    <script src="{{ url_for('user.static', filename= 'js/password-reset-form.js') }}"></script>
</body>
</html>
